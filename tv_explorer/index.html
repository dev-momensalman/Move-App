<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVault — TV Show Explorer</title>
  <meta name="description" content="Discover and explore top TV shows with ratings, genres, and full details. Powered by TVMaze data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:       #080b14;
      --bg-panel:      #0e1220;
      --bg-card:       #111827;
      --bg-card-hover: #161e30;
      --border:        rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.15);
      --text-primary:  #f0f4ff;
      --text-secondary:#94a3b8;
      --text-muted:    #64748b;
      --accent:        #6366f1;
      --accent-glow:   rgba(99,102,241,0.35);
      --accent2:       #ec4899;
      --gold:          #f59e0b;
      --green:         #22c55e;
      --red:           #ef4444;
      --blue:          #3b82f6;
      --radius:        14px;
      --shadow-card:   0 4px 24px rgba(0,0,0,0.5);
      --transition:    all 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ─── HERO HEADER ─── */
    .hero {
      position: relative;
      padding: 80px 24px 60px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-badge::before { content: '◈'; font-size: 10px; }
    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 40%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 540px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 36px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* ─── CONTROLS ─── */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,11,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .controls-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px 10px 40px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    select, .sort-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: var(--transition);
    }
    select:focus, select:hover { border-color: var(--accent); color: var(--text-primary); }
    select option { background: var(--bg-card); }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      transition: var(--transition);
      user-select: none;
      white-space: nowrap;
    }
    .filter-pill:hover { border-color: var(--accent); color: var(--text-primary); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 16px var(--accent-glow); }

    .results-info {
      max-width: 1400px;
      margin: 20px auto 0;
      padding: 0 24px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-info span { color: var(--accent); font-weight: 600; }

    /* ─── GRID ─── */
    .grid-container {
      max-width: 1400px;
      margin: 24px auto 60px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ─── SHOW CARD ─── */
    .show-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.35s ease both;
    }
    .show-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-bright);
      box-shadow: var(--shadow-card), 0 0 30px rgba(99,102,241,0.12);
      background: var(--bg-card-hover);
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .card-poster {
      position: relative;
      width: 100%;
      padding-top: 140%;
      overflow: hidden;
      background: #0a0e1a;
    }
    .card-poster img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .show-card:hover .card-poster img { transform: scale(1.04); }
    .poster-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #0e1220, #111827);
      color: var(--text-muted);
      font-size: 13px;
    }
    .poster-placeholder .icon { font-size: 36px; opacity: 0.4; }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8,11,20,0.95) 0%, rgba(8,11,20,0.4) 40%, transparent 70%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .card-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }
    .genre-tag {
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 600;
      color: #a5b4fc;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-title-overlay {
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      line-height: 1.3;
    }

    .status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-Running  { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.45); color: #4ade80; }
    .status-Ended    { background: rgba(100,116,139,0.2); border: 1px solid rgba(100,116,139,0.35); color: #94a3b8; }
    .status-TBD      { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.4); color: #fbbf24; }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .rating {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
    }
    .rating .star { font-size: 12px; }
    .rating.none { color: var(--text-muted); font-weight: 400; opacity: 0.7; }

    .network-pill {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .card-info-row {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .info-item { display: flex; align-items: center; gap: 4px; }
    .info-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }

    .card-summary {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .view-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
      transition: var(--transition);
    }
    .show-card:hover .view-btn { opacity: 1; }
    .type-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      max-width: 860px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.94) translateY(20px);
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: var(--transition);
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .modal-hero {
      display: flex;
      gap: 0;
      min-height: 300px;
    }
    .modal-poster {
      width: 220px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-radius: 20px 0 0 0;
    }
    .modal-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0e1220, #111827);
      font-size: 48px;
      opacity: 0.4;
    }
    .modal-header {
      flex: 1;
      padding: 32px 32px 28px;
      background: linear-gradient(135deg, rgba(99,102,241,0.08), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-radius: 0 20px 0 0;
    }
    .modal-status-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .modal-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .modal-genres { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-genre {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #a5b4fc;
    }

    .modal-body { padding: 28px 32px 32px; display: flex; flex-direction: column; gap: 24px; }
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .modal-stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .modal-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .modal-stat-value { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .modal-stat-value.gold { color: var(--gold); }
    .modal-stat-value.green { color: var(--green); }

    .modal-summary h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
    .modal-summary p { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition);
      align-self: flex-start;
    }
    .modal-link:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 24px;
    }
    .empty-state .icon { font-size: 56px; margin-bottom: 20px; opacity: 0.4; }
    .empty-state h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 8px; }
    .empty-state p { color: var(--text-muted); font-size: 14px; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
    footer span { color: var(--accent); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .hero { padding: 48px 16px 40px; }
      .controls-inner { gap: 8px; }
      .grid-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 0 12px; }
      .modal-hero { flex-direction: column; }
      .modal-poster { width: 100%; height: 220px; border-radius: 20px 20px 0 0; }
      .modal-header { border-radius: 0; padding: 20px; }
      .modal-body { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- ─── HERO ─── -->
<header class="hero">
  <div class="hero-badge">TVMaze Powered</div>
  <h1>CineVault</h1>
  <p>Browse, search, and discover your next obsession from a curated collection of top TV shows across every genre.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">Shows</div></div>
    <div class="stat"><div class="stat-num" id="running-count">—</div><div class="stat-label">Running</div></div>
    <div class="stat"><div class="stat-num" id="genre-count">—</div><div class="stat-label">Genres</div></div>
    <div class="stat"><div class="stat-num" id="top-rating">—</div><div class="stat-label">Top Rating</div></div>
  </div>
</header>

<!-- ─── CONTROLS ─── -->
<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search shows, genres, networks…" autocomplete="off" />
    </div>
    <div class="filter-group">
      <select id="genre-filter">
        <option value="">All Genres</option>
      </select>
      <select id="status-filter">
        <option value="">All Status</option>
        <option value="Running">🟢 Running</option>
        <option value="Ended">⚫ Ended</option>
        <option value="To Be Determined">🟡 TBD</option>
      </select>
      <select id="sort-select">
        <option value="rating">⭐ Top Rated</option>
        <option value="name">🔤 A–Z</option>
        <option value="premiered">📅 Newest</option>
        <option value="weight">🔥 Popularity</option>
      </select>
    </div>
  </div>
</div>

<!-- ─── RESULTS INFO ─── -->
<div class="results-info">
  <div id="results-text">Loading…</div>
  <div class="filter-group" style="gap:6px">
    <button class="filter-pill active" data-type="">All Types</button>
    <button class="filter-pill" data-type="Scripted">Scripted</button>
    <button class="filter-pill" data-type="Animation">Animation</button>
    <button class="filter-pill" data-type="Reality">Reality</button>
  </div>
</div>

<!-- ─── GRID ─── -->
<main class="grid-container" id="grid"></main>

<!-- ─── MODAL ─── -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ─── FOOTER ─── -->
<footer>
  Powered by <span>TVMaze API</span> · Built with ♥ · CineVault 2025
</footer>

miered":"1999-09-20","ended":null,"rating":{"average":7.9},"weight":100,"network":{"id":1,"name":"NBC"},"webChannel":null,"image":{"medium":"https://static.tvmaze.com/uploads/images/medium_portrait/589/1472924.jpg"},"summary":"<p>The dedicated detectives of the Special Victims Unit investigate sexually-based offenses in New York City.</p>"}];

// ───────────────────── STATE ─────────────────────
let activeType = '';
let currentShows = [...RAW];

// ───────────────────── INIT ─────────────────────
function init() {
  populateFilters();
  updateHeroStats();
  renderGrid(RAW);
  attachEvents();
}

function populateFilters() {
  const allGenres = new Set();
  RAW.forEach(s => s.genres.forEach(g => allGenres.add(g)));
  const genreSelect = document.getElementById('genre-filter');
  [...allGenres].sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    genreSelect.appendChild(opt);
  });
}

function updateHeroStats() {
  document.getElementById('total-count').textContent = RAW.length;
  document.getElementById('running-count').textContent = RAW.filter(s => s.status === 'Running').length;
  const genres = new Set(RAW.flatMap(s => s.genres));
  document.getElementById('genre-count').textContent = genres.size;
  const top = Math.max(...RAW.map(s => s.rating?.average || 0));
  document.getElementById('top-rating').textContent = top.toFixed(1) + '★';
}

// ───────────────────── FILTER & SORT ─────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const genre = document.getElementById('genre-filter').value;
  const status = document.getElementById('status-filter').value;
  const sort = document.getElementById('sort-select').value;

  let shows = RAW.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q) ||
      s.genres.some(g => g.toLowerCase().includes(q)) ||
      (s.network?.name || s.webChannel?.name || '').toLowerCase().includes(q) ||
      (s.summary || '').toLowerCase().includes(q.replace(/<[^>]+>/g,''));
    const matchGenre = !genre || s.genres.includes(genre);
    const matchStatus = !status || s.status === status;
    const matchType = !activeType || s.type === activeType;
    return matchQ && matchGenre && matchStatus && matchType;
  });

  shows.sort((a, b) => {
    if (sort === 'rating') return (b.rating?.average || 0) - (a.rating?.average || 0);
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'premiered') return (b.premiered || '').localeCompare(a.premiered || '');
    if (sort === 'weight') return (b.weight || 0) - (a.weight || 0);
    return 0;
  });

  currentShows = shows;
  renderGrid(shows);
}

// ───────────────────── RENDER ─────────────────────
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent || '';
}

function statusClass(status) {
  if (status === 'Running') return 'status-Running';
  if (status === 'Ended') return 'status-Ended';
  return 'status-TBD';
}

function renderGrid(shows) {
  const grid = document.getElementById('grid');
  const info = document.getElementById('results-text');
  
  info.innerHTML = `Showing <span>${shows.length}</span> of ${RAW.length} shows`;

  if (shows.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">🎬</div>
      <h3>No shows found</h3>
      <p>Try adjusting your search or filters</p>
    </div>`;
    return;
  }

  grid.innerHTML = shows.map((s, i) => {
    const net = s.network?.name || s.webChannel?.name || 'Unknown';
    const rating = s.rating?.average;
    const ratingHtml = rating
      ? `<div class="rating"><span class="star">★</span>${rating}</div>`
      : `<div class="rating none">No rating</div>`;
    const genreTags = s.genres.slice(0,2).map(g => `<span class="genre-tag">${g}</span>`).join('');
    const summary = stripHtml(s.summary);
    const premiered = s.premiered ? s.premiered.slice(0,4) : '—';
    const runtime = s.averageRuntime ? `${s.averageRuntime}m` : (s.runtime ? `${s.runtime}m` : '—');
    const statusCls = statusClass(s.status);
    
    return `<div class="show-card" onclick="openModal(${s.id})" style="animation-delay:${Math.min(i,20)*0.03}s" id="card-${s.id}">
      <div class="card-poster">
        ${s.image?.medium
          ? `<img src="${s.image.medium}" alt="${s.name} poster" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"poster-placeholder\\"><div class=\\"icon\\">🎬</div><span>${s.name.slice(0,12)}</span></div>'">`
          : `<div class="poster-placeholder"><div class="icon">🎬</div><span>${s.name.slice(0,12)}</span></div>`}
        <span class="status-badge ${statusCls}">${s.status === 'To Be Determined' ? 'TBD' : s.status}</span>
        <div class="card-overlay">
          <div class="card-genres">${genreTags}</div>
          <div class="card-title-overlay">${s.name}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          ${ratingHtml}
          <span class="network-pill">${net}</span>
        </div>
        <div class="card-info-row">
          <span class="info-item">📅 ${premiered}</span>
          <span class="info-dot"></span>
          <span class="info-item">⏱ ${runtime}</span>
          <span class="info-dot"></span>
          <span class="info-item">${s.type}</span>
        </div>
        <div class="card-summary">${summary}</div>
        <div class="card-footer">
          <span class="view-btn">Details →</span>
          <span class="type-label">${s.language}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ───────────────────── MODAL ─────────────────────
function openModal(id) {
  const s = RAW.find(x => x.id === id);
  if (!s) return;

  const net = s.network?.name || s.webChannel?.name || 'Unknown';
  const rating = s.rating?.average;
  const premiered = s.premiered || '—';
  const ended = s.ended || (s.status === 'Running' ? 'Present' : '—');
  const summary = s.summary ? s.summary.replace(/<b>/g,'<strong>').replace(/<\/b>/g,'</strong>').replace(/<i>/g,'<em>').replace(/<\/i>/g,'</em>').replace(/<p>/g,'').replace(/<\/p>/g,'<br><br>') : 'No summary available.';
  const statusCls = statusClass(s.status);
  const runtime = s.averageRuntime || s.runtime;

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-hero">
      <div class="modal-poster">
        ${s.image?.medium
          ? `<img src="${s.image.medium}" alt="${s.name}" style="width:100%;height:100%;object-fit:cover;">`
          : `<div class="modal-poster-placeholder">🎬</div>`}
      </div>
      <div class="modal-header">
        <div class="modal-status-row">
          <span class="status-badge ${statusCls}" style="position:static">${s.status === 'To Be Determined' ? 'TBD' : s.status}</span>
          <span class="type-label">${s.type} · ${s.language}</span>
        </div>
        <div class="modal-title">${s.name}</div>
        <div class="modal-genres">${s.genres.map(g=>`<span class="modal-genre">${g}</span>`).join('')}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-label">Rating</div>
          <div class="modal-stat-value gold">${rating ? `★ ${rating} / 10` : 'N/A'}</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Network</div>
          <div class="modal-stat-value">${net}</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Premiered</div>
          <div class="modal-stat-value">${premiered}</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Ended</div>
          <div class="modal-stat-value ${s.status === 'Running' ? 'green' : ''}">${ended}</div>
        </div>
        ${runtime ? `<div class="modal-stat"><div class="modal-stat-label">Runtime</div><div class="modal-stat-value">${runtime} min</div></div>` : ''}
        <div class="modal-stat">
          <div class="modal-stat-label">Popularity</div>
          <div class="modal-stat-value">${s.weight}/100</div>
        </div>
      </div>
      <div class="modal-summary">
        <h3>Synopsis</h3>
        <p>${summary}</p>
      </div>
      <a href="${s.url}" target="_blank" rel="noopener" class="modal-link">
        View on TVMaze →
      </a>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ───────────────────── EVENTS ─────────────────────
function attachEvents() {
  document.getElementById('search').addEventListener('input', debounce(applyFilters, 250));
  document.getElementById('genre-filter').addEventListener('change', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeType = pill.dataset.type;
      applyFilters();
    });
  });
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

init();
</script>
